{% extends 'base.html' %}

{% block content %}
<div class="row align-items-center justify-content-center mt-5" style="min-height: 70vh;">
    <div class="col-md-9 text-center p-5 glass-panel rounded-4">
        <h1 class="display-3 fw-bold mb-4 font-playfair text-gold">Grand Hotel</h1>
        <p class="lead mb-5 fs-4 text-light">Experience timeless luxury and unparalleled comfort.</p>
        <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
            <a href="{{ url_for('rooms') }}" class="btn btn-gold btn-lg px-5 py-3 rounded-pill fw-bold text-uppercase shadow-sm">Explore Rooms</a>
            {% if not current_user.is_authenticated %}
                <a href="{{ url_for('login') }}" class="btn btn-outline-light btn-lg px-5 py-3 rounded-pill fw-bold text-uppercase shadow-sm">Sign In</a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
