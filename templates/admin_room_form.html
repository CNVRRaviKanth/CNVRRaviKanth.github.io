{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="glass-card p-5">
                <div class="text-center mb-5">
                    <h1 class="display-5 fw-bold text-white mb-2">{{ title }}</h1>
                    <p class="text-white-50">Configure room details and capacity</p>
                </div>

                <form method="POST" class="needs-validation" novalidate>
                    <div class="row g-4">
                        <div class="col-md-12">
                            <label class="form-label text-white-50">Room Name</label>
                            <input type="text" name="name" class="form-control glass-input" value="{{ room.name if room else '' }}" placeholder="e.g., Signature Royal Suite" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label text-white-50">Room Type</label>
                            <select name="type" class="form-select glass-input" required>
                                <option value="Single" {% if room and room.type == 'Single' %}selected{% endif %}>Single</option>
                                <option value="Double" {% if room and room.type == 'Double' %}selected{% endif %}>Double</option>
                                <option value="Suite" {% if room and room.type == 'Suite' %}selected{% endif %}>Suite</option>
                                <option value="Shared" {% if room and room.type == 'Shared' %}selected{% endif %}>Shared</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label text-white-50">Capacity Arrangement</label>
                            <select name="capacity" class="form-select glass-input" required>
                                <option value="Single" {% if room and room.capacity == 'Single' %}selected{% endif %}>Single</option>
                                <option value="Two Shared" {% if room and room.capacity == 'Two Shared' %}selected{% endif %}>Two Shared</option>
                                <option value="Three Shared" {% if room and room.capacity == 'Three Shared' %}selected{% endif %}>Three Shared</option>
                                <option value="Four Shared" {% if room and room.capacity == 'Four Shared' %}selected{% endif %}>Four Shared</option>
                                <option value="Double Sharing" {% if room and room.capacity == 'Double Sharing' %}selected{% endif %}>Double Sharing</option>
                            </select>
                        </div>

                        <div class="col-md-12">
                            <label class="form-label text-white-50">Room Category</label>
                            <select name="category" class="form-select glass-input" required>
                                <option value="Business" {% if room and room.category == 'Business' %}selected{% endif %}>Business</option>
                                <option value="Family" {% if room and room.category == 'Family' %}selected{% endif %}>Family</option>
                                <option value="Travel" {% if room and room.category == 'Travel' %}selected{% endif %}>Travel</option>
                                <option value="Luxury" {% if room and room.category == 'Luxury' %}selected{% endif %}>Luxury</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label text-white-50">Price per Night ($)</label>
                            <input type="number" step="0.01" name="price" class="form-control glass-input" value="{{ room.price_per_night if room else '' }}" placeholder="0.00" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label text-white-50">Total Number of Rooms</label>
                            <input type="number" name="total_rooms" class="form-control glass-input" value="{{ room.total_rooms if room else '1' }}" min="1" required>
                        </div>

                        <div class="col-md-12">
                            <label class="form-label text-white-50">Description</label>
                            <textarea name="description" class="form-control glass-input" rows="4" placeholder="Describe the room experience...">{{ room.description if room else '' }}</textarea>
                        </div>

                        <div class="col-md-12 mt-5">
                            <button type="submit" class="btn btn-accent w-100 py-3 rounded-pill fw-bold">
                                {{ 'Update Room' if room else 'Add Room to Inventory' }}
                            </button>
                            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-link w-100 text-white-50 mt-3 text-decoration-none">Cancel and Return</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 30px;
    }
    .glass-input {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        border-radius: 12px;
        padding: 12px 15px;
    }
    .glass-input:focus {
        background: rgba(255, 255, 255, 0.08);
        border-color: #C5A059;
        color: white;
        box-shadow: 0 0 15px rgba(197, 160, 89, 0.2);
    }
    .glass-input option {
        background: #1a1a1a;
        color: white;
    }
    .btn-accent {
        background: #C5A059;
        color: white;
        border: none;
        transition: all 0.3s ease;
    }
    .btn-accent:hover {
        background: #b08e4d;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(197, 160, 89, 0.3);
    }
</style>
{% endblock %}
